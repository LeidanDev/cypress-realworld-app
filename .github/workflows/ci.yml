name: CI

on: [push]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress Run
        uses: cypress-io/github-action@v6   # ✅ nome correto
        with:
          install: npm install
          start: npm run dev
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome
          config: baseUrl=http://localhost:3000

      - name: Upload Cypress Artifacts
        if: always()
        uses: actions/upload-artifact@v4   # ✅ versão atualizada
        with:
          name: Cypress Results
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore